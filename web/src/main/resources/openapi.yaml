openapi: 3.0.0
info:
  title: Generic Multi-Module Spring Boot API
  description: A generic multi-module Spring Boot application with CRUD operations
  version: 1.0.0
  contact:
    name: API Support
    url: https://example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: User
    description: User management operations
  - name: Resource
    description: Generic resource operations
  - name: Health
    description: Application health check

paths:
  /api/v1/health:
    get:
      summary: Health check endpoint
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [UP, DOWN]
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/users:
    get:
      summary: Get all users
      operationId: listUsers
      tags:
        - User
      parameters:
        - name: page
          in: query
          description: Page number (0-indexed)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

    post:
      summary: Create a new user
      operationId: createUser
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '400':
          description: Invalid input
        '409':
          description: User already exists
        '500':
          description: Internal server error

  /api/v1/users/{userId}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags:
        - User
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '404':
          description: User not found
        '500':
          description: Internal server error

    put:
      summary: Update user by ID
      operationId: updateUser
      tags:
        - User
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '400':
          description: Invalid input
        '404':
          description: User not found
        '500':
          description: Internal server error

    delete:
      summary: Delete user by ID
      operationId: deleteUser
      tags:
        - User
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
        '500':
          description: Internal server error

  /api/v1/resources:
    get:
      summary: Get all resources
      operationId: listResources
      tags:
        - Resource
      parameters:
        - name: page
          in: query
          description: Page number (0-indexed)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of resources retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePage'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

    post:
      summary: Create a new resource
      operationId: createResource
      tags:
        - Resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDto'
        '400':
          description: Invalid input
        '500':
          description: Internal server error

  /api/v1/resources/{resourceId}:
    get:
      summary: Get resource by ID
      operationId: getResourceById
      tags:
        - Resource
      parameters:
        - name: resourceId
          in: path
          required: true
          description: The resource ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDto'
        '404':
          description: Resource not found
        '500':
          description: Internal server error

    put:
      summary: Update resource by ID
      operationId: updateResource
      tags:
        - Resource
      parameters:
        - name: resourceId
          in: path
          required: true
          description: The resource ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResourceRequest'
      responses:
        '200':
          description: Resource updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDto'
        '400':
          description: Invalid input
        '404':
          description: Resource not found
        '500':
          description: Internal server error

    delete:
      summary: Delete resource by ID
      operationId: deleteResource
      tags:
        - Resource
      parameters:
        - name: resourceId
          in: path
          required: true
          description: The resource ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource deleted successfully
        '404':
          description: Resource not found
        '500':
          description: Internal server error

components:
  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User unique identifier
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: User's username
        email:
          type: string
          format: email
          description: User's email address
        firstName:
          type: string
          maxLength: 100
          description: User's first name
        lastName:
          type: string
          maxLength: 100
          description: User's last name
        active:
          type: boolean
          description: User account status
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - username
        - email

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: User's username
        email:
          type: string
          format: email
          description: User's email address
        firstName:
          type: string
          maxLength: 100
          description: User's first name
        lastName:
          type: string
          maxLength: 100
          description: User's last name
        password:
          type: string
          minLength: 8
          description: User's password
        active:
          type: boolean
          default: true
          description: User account status
      required:
        - username
        - email
        - password

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: User's username
        email:
          type: string
          format: email
          description: User's email address
        firstName:
          type: string
          maxLength: 100
          description: User's first name
        lastName:
          type: string
          maxLength: 100
          description: User's last name
        active:
          type: boolean
          description: User account status

    UserPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserDto'
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        lastPage:
          type: boolean
          description: Is this the last page

    ResourceDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Resource unique identifier
        name:
          type: string
          maxLength: 255
          description: Resource name
        description:
          type: string
          description: Resource description
        type:
          type: string
          enum: [TYPE_A, TYPE_B, TYPE_C]
          description: Resource type
        active:
          type: boolean
          description: Resource status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - name
        - type

    CreateResourceRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          description: Resource name
        description:
          type: string
          description: Resource description
        type:
          type: string
          enum: [TYPE_A, TYPE_B, TYPE_C]
          description: Resource type
        active:
          type: boolean
          default: true
          description: Resource status
      required:
        - name
        - type

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          description: Resource name
        description:
          type: string
          description: Resource description
        type:
          type: string
          enum: [TYPE_A, TYPE_B, TYPE_C]
          description: Resource type
        active:
          type: boolean
          description: Resource status

    ResourcePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResourceDto'
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        lastPage:
          type: boolean
          description: Is this the last page
